    <meta charset="utf-8">

    <title>Festival 2026</title>
    <style>
      :root {
        --paper: #e6dec2;
        --ink: #36222a;
        --green: #2bae73;
        --yellow: #fdba12;
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--paper);
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: "Arial Hebrew", "Noto Sans Hebrew", Arial, sans-serif;
      }

      .page-shell {
        width: min(100%, 1922px);
        margin-inline: auto;
        overflow: hidden;
        direction: ltr;
      }

      .artwork-stage {
        position: relative;
        width: 100%;
        aspect-ratio: 1922 / 10885;
        background: var(--paper);
        isolation: isolate;
      }

      .artwork {
        position: absolute;
        inset: 0;
        z-index: 1;
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        pointer-events: none;
        user-select: none;
      }

      .artwork-mobile,
      .mobile-hotspot {
        display: none;
      }

      .button-hotspot {
        position: absolute;
        z-index: 2;
        display: block;
        border: 0;
        padding: 0;
        background: transparent;
        color: transparent;
        cursor: pointer;
        appearance: none;
        -webkit-tap-highlight-color: rgba(253, 186, 18, 0.35);
      }

      .button-hotspot:focus-visible {
        outline: 4px solid rgba(54, 34, 42, 0.9);
        outline-offset: 4px;
        border-radius: 2px;
      }

      .button-hotspot:hover {
        background: rgba(253, 186, 18, 0.14);
      }

      .button-hotspot:active {
        background: rgba(54, 34, 42, 0.12);
      }

      .button-hotspot.is-pressed {
        animation: button-pulse 420ms ease;
      }

      @keyframes button-pulse {
        0% { box-shadow: inset 0 0 0 0 rgba(54, 34, 42, 0); }
        45% { box-shadow: inset 0 0 0 999px rgba(54, 34, 42, 0.12); }
        100% { box-shadow: inset 0 0 0 0 rgba(54, 34, 42, 0); }
      }

      @media (max-width: 720px) {
        .page-shell {
          width: 100%;
        }

        .artwork-stage {
          aspect-ratio: 390 / 6362;
        }

        .artwork:not(.artwork-mobile),
        .button-hotspot:not(.mobile-hotspot) {
          display: none;
        }

        .artwork-mobile,
        .mobile-hotspot {
          display: block;
        }

        .button-hotspot:focus-visible {
          outline-width: 3px;
          outline-offset: 3px;
        }
      }
    </style>

    <script>
      document.querySelectorAll(".button-hotspot").forEach((button) => {
        button.addEventListener("click", () => {
          const url = button.dataset.url;
          button.classList.remove("is-pressed");
          void button.offsetWidth;
          button.classList.add("is-pressed");

          if (url) {
            window.open(url, "_blank", "noopener,noreferrer");
          }
        });
      });
