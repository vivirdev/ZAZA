<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZAZA</title>
    <style>
      :root {
        --ink: #36222a;
        --paper: #e6dec2;
        --focus: #fdb913;
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--paper);
        scroll-behavior: smooth;
      }

      body {
        min-height: 100vh;
        margin: 0;
        direction: ltr;
        background:
          linear-gradient(90deg, rgba(54, 34, 42, 0.05) 1px, transparent 1px),
          linear-gradient(0deg, rgba(54, 34, 42, 0.04) 1px, transparent 1px),
          var(--paper);
        background-size: 32px 32px;
        font-family: "Arial Hebrew", "Noto Sans Hebrew", Arial, sans-serif;
        color: var(--ink);
      }

      .page-shell {
        width: min(100%, 1920px);
        margin-inline: auto;
        overflow: hidden;
        direction: ltr;
        box-shadow: 0 0 0 1px rgba(54, 34, 42, 0.08);
      }

      .festival-stage {
        position: relative;
        width: 100%;
        aspect-ratio: 1920 / 6176;
        background: var(--paper);
        isolation: isolate;
        direction: ltr;
      }

      .hero-video-layer {
        position: absolute;
        inset: 0 0 auto 0;
        height: 16.185245%;
        z-index: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 48% 48%, rgba(255, 255, 255, 0.25) 0 13%, transparent 13.2%),
          linear-gradient(135deg, rgba(253, 185, 19, 0.16), transparent 38%),
          var(--paper);
      }

      .hero-video-layer::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 2;
        background:
          repeating-linear-gradient(
            90deg,
            rgba(54, 34, 42, 0.035) 0 1px,
            transparent 1px 56px
          );
        mix-blend-mode: multiply;
        pointer-events: none;
      }

      .hero-video-tint {
        position: absolute;
        inset: 0 0 auto 0;
        height: 16.185245%;
        z-index: 1;
        display: none;
        background: rgba(54, 34, 42, 0.22);
        pointer-events: none;
      }

      .hero-video-canvas,
      .hero-video-layer video {
        position: absolute;
        inset: 0;
        z-index: 0;
        width: 100%;
        height: 100%;
        display: none;
        pointer-events: none;
      }

      .hero-video-canvas {
        object-fit: cover;
      }

      .hero-video-layer video {
        object-fit: cover;
        opacity: 0;
      }

      .hero-video-layer video::-webkit-media-controls,
      .hero-video-layer video::-webkit-media-controls-panel,
      .hero-video-layer video::-webkit-media-controls-play-button,
      .hero-video-layer video::-webkit-media-controls-start-playback-button {
        display: none !important;
        opacity: 0 !important;
        visibility: hidden !important;
        -webkit-appearance: none;
      }

      .artwork {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: block;
        pointer-events: none;
        user-select: none;
        border: 0;
      }

      .artwork-mobile {
        display: none;
      }

      .button-hotspot {
        position: absolute;
        z-index: 2;
        display: block;
        border: 0;
        padding: 0;
        background: transparent;
        color: transparent;
        text-decoration: none;
        cursor: pointer;
        font: inherit;
        appearance: none;
        -webkit-tap-highlight-color: rgba(253, 185, 19, 0.25);
      }

      .button-hotspot:hover {
        box-shadow: inset 0 0 0 max(2px, 0.12vw) rgba(253, 185, 19, 0.8);
      }

      .button-hotspot:focus-visible {
        outline: max(3px, 0.16vw) solid var(--focus);
        outline-offset: max(4px, 0.2vw);
      }

      .button-hotspot:active {
        transform: translateY(1px);
      }

      .hero-cta {
        left: 44.244792%;
        top: 11.194009%;
        width: 11.510417%;
        height: 0.906736%;
      }

      .program-primary {
        left: 40.917760%;
        top: 36.887953%;
        width: 7.552083%;
        height: 0.906736%;
      }

      .program-secondary {
        left: 30.240677%;
        top: 36.887953%;
        width: 9.427083%;
        height: 0.906736%;
      }

      .card-action-1 {
        left: 22.630208%;
        top: 48.129858%;
        width: 5.260417%;
        height: 0.728627%;
      }

      .card-action-2 {
        left: 22.630208%;
        top: 55.772345%;
        width: 5.260417%;
        height: 0.728627%;
      }

      .card-action-3 {
        left: 22.630208%;
        top: 63.431023%;
        width: 5.260417%;
        height: 0.728627%;
      }

      .scroll-target {
        position: absolute;
        left: 0;
        width: 1px;
        height: 1px;
        pointer-events: none;
      }

      #creators {
        top: 42.880102%;
      }

      .sr-only {
        position: absolute;
        direction: rtl;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 720px) {
        html {
          background: #2271AE;
        }

        body {
          background: #2271AE;
          background-size: 22px 22px;
        }

        .page-shell {
          box-shadow: none;
        }

        .festival-stage {
          aspect-ratio: 427 / 3738;
          background: #2271AE;
        }

        .hero-video-layer {
          z-index: 0;
          height: 11.503478%;
          opacity: 1;
          mix-blend-mode: normal;
          background: transparent;
          pointer-events: none;
        }

        .hero-video-tint {
          display: block;
          z-index: 0;
          height: 11.503478%;
          background: rgba(54, 34, 42, 0.1);
          mix-blend-mode: multiply;
        }

        .hero-video-layer::after {
          display: none;
        }

        .hero-video-layer video {
          display: block;
          background: transparent;
        }

        .hero-video-canvas {
          display: block;
        }

        .artwork-desktop {
          display: none;
        }

        .artwork-mobile {
          display: block;
          left: 0;
          width: 100%;
        }

        .hero-cta {
          left: 34.899274%;
          top: 8.138848%;
          width: 30.140515%;
          height: 0.723781%;
        }

        .program-primary {
          left: 68.903958%;
          top: 42.215657%;
          width: 17.002342%;
          height: 0.664697%;
        }

        .program-secondary {
          left: 45.718946%;
          top: 42.215657%;
          width: 21.381733%;
          height: 0.664697%;
        }

        .card-action-1 {
          left: 74.571405%;
          top: 50.797637%;
          width: 12.622951%;
          height: 0.664697%;
        }

        .card-action-2 {
          left: 74.571405%;
          top: 60.974889%;
          width: 12.622951%;
          height: 0.679468%;
        }

        .card-action-3 {
          left: 74.571405%;
          top: 69.675037%;
          width: 12.622951%;
          height: 0.664697%;
        }

        #creators {
          top: 45.662966%;
        }

        .button-hotspot:hover {
          box-shadow: none;
        }

        .button-hotspot:focus-visible {
          outline-width: 3px;
          outline-offset: 3px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page-shell" aria-label="ZAZA">
      <section class="festival-stage" id="top">
        <div class="hero-video-layer" aria-hidden="true">
          <canvas class="hero-video-canvas"></canvas>
          <video muted autoplay loop playsinline webkit-playsinline preload="metadata" controlslist="nodownload noplaybackrate nofullscreen" disablepictureinpicture disableremoteplayback tabindex="-1">
            <source src="assets/meshotetim-jaffa-02-hq.mp4" type="video/mp4" media="(max-width: 720px)">
          </video>
        </div>
        <span class="hero-video-tint" aria-hidden="true"></span>

        <img
          class="artwork artwork-desktop"
          src="assets/festival-2026-artwork.svg?v=3"
          alt="Festival 2026"
          draggable="false"
        >
        <img
          class="artwork artwork-mobile"
          src="assets/festival-2026-mobile-artwork.svg?v=16"
          alt="Festival 2026"
          draggable="false"
        >

        <span class="scroll-target" id="creators" aria-hidden="true"></span>

        <button class="button-hotspot hero-cta" type="button" data-action="creators" data-scroll-target="creators" aria-label="לגלות את היוצרים">
          <span class="sr-only">לגלות את היוצרים</span>
        </button>
        <button class="button-hotspot program-primary" type="button" data-action="program" data-url="https://www.oldjaffa.co.il/jar-old-jaffa-artists-residency/" aria-label="לאתר JAR">
          <span class="sr-only">לאתר JAR</span>
        </button>
        <button class="button-hotspot program-secondary" type="button" data-action="details" data-url="https://www.choreographers.org.il/" aria-label="לאתר העמותה">
          <span class="sr-only">לאתר העמותה</span>
        </button>
        <button
          class="button-hotspot card-action-1"
          type="button"
          data-action="card-1"
          data-url="https://www.choreographers.org.il/performance/%d7%a7%d7%95%d7%9c%d7%95-%d7%a9%d7%9c-%d7%94%d7%a2%d7%95%d7%9c%d7%9d-%d7%a9%d7%a8%d7%a7-%d7%90%d7%a0%d7%99-%d7%a9%d7%95%d7%9e%d7%a2%d7%aa-2/?isApp=1"
          aria-label="לרכישה - קולו של העולם שרק אני שומעת"
        >
          <span class="sr-only">לרכישה - קולו של העולם שרק אני שומעת</span>
        </button>
        <button
          class="button-hotspot card-action-2"
          type="button"
          data-action="card-2"
          data-url="https://www.choreographers.org.il/performance/you-are-now-one-of-us/?isApp=1"
          aria-label="לרכישה - You are now One Of Us"
        >
          <span class="sr-only">לרכישה - You are now One Of Us</span>
        </button>
        <button
          class="button-hotspot card-action-3"
          type="button"
          data-action="card-3"
          data-url="https://www.choreographers.org.il/performance/%d7%a2%d7%a8%d7%95%d7%93/?isApp=1"
          aria-label="לרכישה - ערוד"
        >
          <span class="sr-only">לרכישה - ערוד</span>
        </button>
      </section>
    </main>
    <script>
      const heroVideo = document.querySelector(".hero-video-layer video");
      const heroVideoCanvas = document.querySelector(".hero-video-canvas");
      if (heroVideo) {
        heroVideo.muted = true;
        heroVideo.defaultMuted = true;
        heroVideo.playsInline = true;

        const drawHeroVideo = () => {
          if (!heroVideoCanvas || !heroVideo.videoWidth || !heroVideo.videoHeight) {
            requestAnimationFrame(drawHeroVideo);
            return;
          }

          const bounds = heroVideoCanvas.getBoundingClientRect();
          const ratio = Math.min(window.devicePixelRatio || 1, 2);
          const width = Math.max(1, Math.round(bounds.width * ratio));
          const height = Math.max(1, Math.round(bounds.height * ratio));

          if (heroVideoCanvas.width !== width || heroVideoCanvas.height !== height) {
            heroVideoCanvas.width = width;
            heroVideoCanvas.height = height;
          }

          const context = heroVideoCanvas.getContext("2d");
          const videoRatio = heroVideo.videoWidth / heroVideo.videoHeight;
          const canvasRatio = width / height;
          let drawWidth = width;
          let drawHeight = height;
          let offsetX = 0;
          let offsetY = 0;

          if (videoRatio > canvasRatio) {
            drawWidth = height * videoRatio;
            offsetX = (width - drawWidth) / 2;
          } else {
            drawHeight = width / videoRatio;
            offsetY = (height - drawHeight) / 2;
          }

          context.drawImage(heroVideo, offsetX, offsetY, drawWidth, drawHeight);
          requestAnimationFrame(drawHeroVideo);
        };

        const playHeroVideo = () => {
          if (window.matchMedia("(max-width: 720px)").matches) {
            heroVideo.play().catch(() => {});
          }
        };

        playHeroVideo();
        drawHeroVideo();
        heroVideo.addEventListener("loadeddata", playHeroVideo, { once: true });
        window.addEventListener("touchstart", playHeroVideo, { once: true, passive: true });
      }

      document.querySelectorAll(".button-hotspot").forEach((button) => {
        button.addEventListener("click", () => {
          const action = button.dataset.action;
          const url = button.dataset.url;
          const scrollTarget = button.dataset.scrollTarget;
          window.dispatchEvent(new CustomEvent("festival:button", { detail: { action } }));
          if (scrollTarget) {
            document.getElementById(scrollTarget)?.scrollIntoView({ behavior: "smooth", block: "start" });
            window.history.replaceState(null, "", `#${scrollTarget}`);
            return;
          }
          if (url) {
            window.open(url, "_blank", "noopener,noreferrer");
            return;
          }
          window.location.hash = action;
        });
      });
    </script>
  </body>
</html>
